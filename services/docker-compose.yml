version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Nginx API Gateway  (single entry-point)
  # ─────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api-service
      - webhook-service
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API Service  (Facebook Graph API wrapper)
  # ─────────────────────────────────────────────
  api-service:
    build:
      context: ./api-service
      dockerfile: Dockerfile
    env_file:
      - ./api-service/.env
    ports:
      - "3002:3002"
    expose:
      - "3002"
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Webhook Service  (Facebook → Kafka ingestion)
  # ─────────────────────────────────────────────
  webhook-service:
    build:
      context: ./webhook-service
      dockerfile: Dockerfile
    env_file:
      - ./webhook-service/.env
    ports:
      - "3001:3001"
    expose:
      - "3001"
    depends_on:
      - kafka
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Infrastructure: Apache Kafka (KRaft mode)
  # ─────────────────────────────────────────────
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

  # ─────────────────────────────────────────────
  # Interactive UI for Kafka (Kafka-UI)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=LocalKafka
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      - kafka
